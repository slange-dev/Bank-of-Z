<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Deposit Funds - Bank of Z</title>

    <!-- Carbon Design System Styles -->
    <link rel="stylesheet" href="css/carbon-styles.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/carbon-overrides.css">
</head>

<body>
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <cds-layer class="cds--white landing-page">
        <!-- Banner -->
        <cds-layer class="layer landing-page__banner">
            <div class="landing-page__heading">
                <cds-breadcrumb>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="index.html">Home</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="admin.html">Control Panel</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="account-deposit.html">Deposit Funds</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                </cds-breadcrumb>
                <h1>Deposit Funds to Account</h1>
            </div>
        </cds-layer>

        <div class="cds--content">
            <!-- Error/Notification Container -->
            <div id="notification-container"></div>
        </div>

        <!-- Search Section -->
        <cds-grid class="cds--content">
            <cds-column lg="16" md="8" sm="4">
                <cds-stack gap="7">
                    <cds-form-item>
                        <cds-text-input
                            id="customerId"
                            label="Customer ID"
                            placeholder="C1234567 or I000000015"
                            helper-text="Enter Customer ID with prefix: C for CICS, I for IMS (e.g., C1234567 or I000000015)">
                        </cds-text-input>
                    </cds-form-item>
                    <cds-button id="search-accounts-btn">Search Accounts</cds-button>
                </cds-stack>
            </cds-column>
        </cds-grid>

        <!-- Account Selection Section -->
        <cds-grid class="cds--content" id="account-selection-section" style="display: none;">
            <cds-column lg="16" md="8" sm="4">
                <h3>Select Account for Deposit</h3>
                <p>Click on an account to proceed with deposit:</p>
                <div id="accounts-table"></div>
            </cds-column>
        </cds-grid>

        <!-- Deposit Form Section -->
        <cds-grid class="cds--content" id="deposit-form-section" style="display: none;">
            <cds-column lg="16" md="8" sm="4">
                <h3>Deposit to Account</h3>
                <cds-form id="deposit-form" class="form-constrained">
                    <cds-stack gap="7">
                        <cds-form-item>
                            <cds-text-input id="selectedAccountId" label="Account ID" readonly>
                            </cds-text-input>
                        </cds-form-item>

                        <cds-form-item>
                            <cds-text-input id="selectedAccountType" label="Account Type" readonly>
                            </cds-text-input>
                        </cds-form-item>

                        <cds-form-item>
                            <cds-text-input id="amount" label="Deposit Amount"
                                placeholder="e.g. 100.00"
                                helper-text="Enter the amount to deposit (minimum 0.01)">
                            </cds-text-input>
                        </cds-form-item>

                        <cds-form-item>
                            <cds-text-input id="sortCode" label="Sort Code"
                                placeholder="987654" required
                                helper-text="Bank sort code (defaults to 987654 for this system)">
                            </cds-text-input>
                        </cds-form-item>

                        <cds-form-item>
                            <cds-text-input id="description" label="Description"
                                placeholder="Optional description"
                                helper-text="Add a note about this deposit (optional)">
                            </cds-text-input>
                        </cds-form-item>

                        <cds-button id="submit-btn" type="submit">Deposit Funds</cds-button>
                        <cds-button id="back-btn" kind="secondary">Back to Account Selection</cds-button>
                    </cds-stack>
                </cds-form>
            </cds-column>
        </cds-grid>
    </cds-layer>

    <!-- Carbon Web Components - Component-specific imports -->
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/ui-shell.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/breadcrumb.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/form.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/text-input.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/select.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/number-input.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/button.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/modal.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/stack.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/grid.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/layer.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/loading.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/notification.min.js"></script>

    <!-- Page Script -->
    <script type="module">
        import { createAdminHeader } from './js/components/headers.js';
        import api from './js/api.js';
        import { showLoadingModal, hideLoadingModal, showSuccessModal, showErrorModal, validateCustomerId, parseCustomerId } from './js/utils.js';
        import { config } from './config.js';

        let selectedAccount = null;
        let selectedCustomerId = null;
        let selectedSystem = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Inject header
            document.getElementById('header-container').innerHTML = createAdminHeader();

            // Set default sort code
            document.getElementById('sortCode').value = config.defaults.sortCode;

            // Handle search accounts
            document.getElementById('search-accounts-btn').addEventListener('click', searchCustomerAccounts);
            document.getElementById('customerId').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    searchCustomerAccounts();
                }
            });

            // Handle form submission
            document.getElementById('submit-btn').addEventListener('click', async (e) => {
                e.preventDefault();
                await handleDeposit();
            });

            // Handle back button
            document.getElementById('back-btn').addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('deposit-form-section').style.display = 'none';
                document.getElementById('account-selection-section').style.display = 'block';
            });
        });

        function displayNotification(kind, title, message) {
            const container = document.getElementById('notification-container');
            container.innerHTML = `
                <cds-inline-notification kind="${kind}" title="${title}" subtitle="${message}" hide-close-button></cds-inline-notification>
                <br />
            `;
            // Scroll to top to ensure notification is visible
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function clearNotification() {
            const container = document.getElementById('notification-container');
            container.innerHTML = '';
        }

        async function searchCustomerAccounts() {
            const customerIdInput = document.getElementById('customerId').value.trim();
            
            // Clear any previous notifications
            clearNotification();
            
            if (!customerIdInput) {
                displayNotification('error', 'Validation Error', 'Please enter a Customer ID');
                return;
            }

            // Validate Customer ID
            const validation = validateCustomerId(customerIdInput);
            if (!validation.valid) {
                displayNotification('error', 'Validation Error', validation.error);
                return;
            }
            
            // Parse to get numeric ID and system
            const parsed = parseCustomerId(customerIdInput);
            const customerId = parsed.customerId;
            const system = parsed.system;

            showLoadingModal(`Searching for ${system} customer accounts...`);

            try {
                const response = await api.customers.getCustomerAccounts(customerId, system);
                const accounts = response.accounts || [];
                
                hideLoadingModal();
                
                if (accounts.length === 0) {
                    displayNotification('error', 'No Results', 'No accounts found for this customer');
                    document.getElementById('account-selection-section').style.display = 'none';
                    document.getElementById('deposit-form-section').style.display = 'none';
                } else {
                    selectedCustomerId = customerId;
                    selectedSystem = system;
                    displayAccountsList(accounts);
                }
            } catch (error) {
                hideLoadingModal();
                displayNotification('error', 'Error', 'Customer not found or error loading accounts');
                document.getElementById('account-selection-section').style.display = 'none';
                document.getElementById('deposit-form-section').style.display = 'none';
            }
        }

        function displayAccountsList(accounts) {
            document.getElementById('account-selection-section').style.display = 'block';
            document.getElementById('deposit-form-section').style.display = 'none';
            
            let tableRows = '';
            accounts.forEach((account, index) => {
                const accountNumber = account.accountNumber || account.accountId || 'N/A';
                tableRows += `
                    <tr class="account-row" data-account-index="${index}" style="cursor: pointer;">
                        <td>${account.accountId || 'N/A'}</td>
                        <td>${accountNumber}</td>
                        <td>${account.accountType || 'N/A'}</td>
                        <td>${account.currency || 'N/A'}</td>
                        <td>${account.status || 'N/A'}</td>
                    </tr>
                `;
            });
            
            document.getElementById('accounts-table').innerHTML = `
                <table class="cds--data-table cds--data-table--zebra">
                    <thead>
                        <tr>
                            <th>Account ID</th>
                            <th>Account Number</th>
                            <th>Account Type</th>
                            <th>Currency</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
            
            // Add click handlers to rows
            const rows = document.querySelectorAll('.account-row');
            rows.forEach(row => {
                row.addEventListener('click', () => {
                    const index = parseInt(row.getAttribute('data-account-index'));
                    selectedAccount = accounts[index];
                    showDepositForm();
                });
            });
        }

        function showDepositForm() {
            document.getElementById('account-selection-section').style.display = 'none';
            document.getElementById('deposit-form-section').style.display = 'block';
            
            // Populate account info
            document.getElementById('selectedAccountId').value = selectedAccount.accountId || '';
            document.getElementById('selectedAccountType').value = selectedAccount.accountType || '';
            
            // Clear previous deposit values
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            
            // Scroll to form
            window.scrollTo({ top: document.getElementById('deposit-form-section').offsetTop - 100, behavior: 'smooth' });
        }

        async function handleDeposit() {
            if (!selectedAccount) {
                displayNotification('error', 'Error', 'No account selected');
                return;
            }

            const accountId = selectedAccount.accountId;
            const amount = parseFloat(document.getElementById('amount').value.trim());
            const sortCode = document.getElementById('sortCode').value.trim();
            const description = document.getElementById('description').value.trim();

            // Clear any previous notifications
            clearNotification();

            // Validation

            if (!amount || amount <= 0) {
                displayNotification('error', 'Validation Error', 'Please enter a valid deposit amount greater than 0');
                return;
            }

            if (!sortCode || !/^\d{6}$/.test(sortCode)) {
                displayNotification('error', 'Validation Error', 'Please enter a valid 6-digit sort code');
                return;
            }

            // Prepare deposit data
            const depositData = {
                amount: amount,
                sortCode: sortCode,
                description: description || 'Deposit via web interface'
            };

            showLoadingModal('Processing deposit...');

            try {
                const result = await api.accounts.depositToAccount(accountId, depositData, selectedCustomerId);
                hideLoadingModal();
                
                // The API returns arrays of all customer accounts
                // Find the balance for the specific account we deposited to
                let balanceDisplay = 'N/A';
                if (Array.isArray(result.availableBalance) && result.availableBalance.length > 0) {
                    // If accountId is in the array format, parse it
                    const accountIds = result.accountId ? result.accountId.replace(/[\[\]]/g, '').split(',') : [];
                    const accountIndex = accountIds.findIndex(id => id.trim() === accountId.toString());
                    
                    if (accountIndex >= 0 && accountIndex < result.availableBalance.length) {
                        balanceDisplay = result.availableBalance[accountIndex].toFixed(2);
                    } else {
                        // Fallback: use the first balance
                        balanceDisplay = result.availableBalance[0].toFixed(2);
                    }
                }
                
                showSuccessModal(
                    'Deposit Successful',
                    `Successfully deposited $${amount.toFixed(2)} to account ${accountId}. New balance: $${balanceDisplay}`
                );

                // Clear form and reset to search
                document.getElementById('amount').value = '';
                document.getElementById('sortCode').value = config.defaults.sortCode;
                document.getElementById('description').value = '';
                
                // Go back to account selection
                document.getElementById('deposit-form-section').style.display = 'none';
                document.getElementById('account-selection-section').style.display = 'block';
            } catch (error) {
                hideLoadingModal();
                console.error('Deposit error:', error);
                
                let errorMessage = 'Failed to process deposit';
                if (error.message) {
                    errorMessage = error.message;
                } else if (error.status === 404) {
                    errorMessage = 'Account not found';
                } else if (error.status === 400) {
                    errorMessage = 'Invalid deposit request. Please check your input.';
                } else if (error.status === 500) {
                    errorMessage = 'Server error. The backend system may not be configured properly.';
                }
                
                showErrorModal('Deposit Failed', errorMessage);
            }
        }
    </script>
</body>

</html>
