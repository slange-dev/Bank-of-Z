<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Delete Account - Bank of Z</title>
    
    <!-- Carbon Design System Styles -->
    <link rel="stylesheet" href="css/carbon-styles.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/carbon-overrides.css">
</head>
<body>
    <!-- Header Container -->
    <div id="header-container"></div>
    
    <!-- Main Content -->
    <cds-layer class="cds--white landing-page">
        <!-- Banner -->
        <cds-layer class="landing-page__banner">
            <div class="landing-page__heading">
                <cds-breadcrumb>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="index.html">Home</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="admin.html">Control Panel</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="account-delete.html">Delete Account</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                </cds-breadcrumb>
                <h1>Delete Account</h1>
            </div>
        </cds-layer>

        <div class="cds--content">
            <!-- Search Section -->
            <div class="search-section">
                <cds-text-input 
                    id="accountId" 
                    label="Account Number" 
                    placeholder="Enter account number to delete">
                </cds-text-input>
                <br>
                <cds-button id="search-btn">Search</cds-button>
            </div>
            <br>
            <!-- Account Details Section -->
            <cds-layer id="details-section" class="cds--content" style="display: none;">
                <h3>Account Information</h3>
                <div id="account-info"></div>
                <br>
                <cds-button id="delete-btn" kind="danger">Delete Account</cds-button>
            </cds-layer>
        </div>
    </cds-layer>
    
    <!-- Carbon Web Components - Component-specific imports -->
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/ui-shell.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/breadcrumb.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/text-input.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/button.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/modal.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/layer.min.js"></script>
    
    <!-- Page Script -->
    <script type="module">
        import { createAdminHeader } from './js/components/headers.js';
        import api from './js/api.js';
        import { showLoadingModal, hideLoadingModal, showSuccessModal, showErrorModal, formatCurrency } from './js/utils.js';
        
        let currentAccount = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Inject header
            document.getElementById('header-container').innerHTML = createAdminHeader();
            
            // Handle search
            document.getElementById('search-btn').addEventListener('click', searchAccount);
            document.getElementById('accountId').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchAccount();
            });
            
            // Handle delete
            document.getElementById('delete-btn').addEventListener('click', confirmDelete);
        });
        
        async function searchAccount() {
            const accountId = document.getElementById('accountId').value.trim();
            
            if (!accountId) {
                showErrorModal('Validation Error', 'Please enter an account number');
                return;
            }
            
            showLoadingModal('Searching for account...');
            
            try {
                const account = await api.accounts.getAccount(accountId);
                currentAccount = account;
                hideLoadingModal();
                displayAccountInfo(account);
            } catch (error) {
                hideLoadingModal();
                showErrorModal('Error', 'Account not found or error loading data');
            }
        }
        
        function displayAccountInfo(account) {
            const infoHTML = `
                <table class="cds--data-table">
                    <tbody>
                        <tr>
                            <th>Account ID</th>
                            <td>${account.accountId}</td>
                        </tr>
                        <tr>
                            <th>Account Number</th>
                            <td>${account.accountNumber || 'N/A'}</td>
                        </tr>
                        <tr>
                            <th>Sort Code</th>
                            <td>${account.sortCode || 'N/A'}</td>
                        </tr>
                        <tr>
                            <th>Customer ID</th>
                            <td>${account.customerId || 'N/A'}</td>
                        </tr>
                        <tr>
                            <th>Account Type</th>
                            <td>${account.accountType}</td>
                        </tr>
                        <tr>
                            <th>Currency</th>
                            <td>${account.currency}</td>
                        </tr>
                        <tr>
                            <th>Status</th>
                            <td>${account.status}</td>
                        </tr>
                        <tr>
                            <th>IBAN</th>
                            <td>${account.iban || 'N/A'}</td>
                        </tr>
                    </tbody>
                </table>
            `;
            
            document.getElementById('account-info').innerHTML = infoHTML;
            document.getElementById('details-section').style.display = 'block';
        }
        
        function confirmDelete() {
            if (!currentAccount) return;
            
            const modal = document.createElement('cds-modal');
            modal.setAttribute('open', '');
            modal.setAttribute('danger', '');
            modal.innerHTML = `
                <cds-modal-header>
                    <cds-modal-heading>Confirm Deletion</cds-modal-heading>
                </cds-modal-header>
                <cds-modal-body>
                    <p>Are you sure you want to delete account "${currentAccount.accountId}"?</p>
                    <p>This action cannot be undone.</p>
                </cds-modal-body>
                <cds-modal-footer>
                    <cds-modal-footer-button kind="secondary" data-modal-close>Cancel</cds-modal-footer-button>
                    <cds-modal-footer-button kind="danger" id="confirm-delete-btn">Delete</cds-modal-footer-button>
                </cds-modal-footer>
            `;
            
            document.body.appendChild(modal);
            
            modal.querySelector('#confirm-delete-btn').addEventListener('click', async () => {
                modal.remove();
                await deleteAccount();
            });
            
            modal.addEventListener('cds-modal-closed', () => {
                modal.remove();
            });
        }
        
        async function deleteAccount() {
            if (!currentAccount) return;
            
            showLoadingModal('Deleting account...');
            
            try {
                await api.accounts.deleteAccount(currentAccount.accountId);
                hideLoadingModal();
                showSuccessModal(
                    'Success',
                    'Account deleted successfully',
                    () => {
                        window.location.reload();
                    }
                );
            } catch (error) {
                hideLoadingModal();
                
                if (error.message.includes('not supported') || error.message.includes('not implemented')) {
                    showErrorModal('Feature Not Implemented', error.message);
                } else if (error.message.includes('Failed to fetch')) {
                    showErrorModal('Network Error', 'Failed to connect to the server. Please check your connection.');
                } else {
                    showErrorModal('Error', error.message || 'Failed to delete account');
                }
            }
        }
    </script>
</body>
</html>
