<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Transaction Details - Bank of Z</title>

    <!-- Carbon Design System Styles -->
    <link rel="stylesheet" href="css/carbon-styles.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/carbon-overrides.css">
</head>

<body>
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <div class="cds--content landing-page">
        <!-- Banner -->
        <div class="cds--white landing-page__banner">
            <div class="landing-page__heading">
                <cds-breadcrumb>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="index.html">Home</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="admin.html">Control Panel</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="account-transactions.html">Transactions</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="transaction-details.html">Transaction Details</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                </cds-breadcrumb>
                <h1>Transaction Details</h1>
            </div>
        </div>

        <!-- Transaction Details Section -->
        <div id="details-section" class="cds--row">
            <div class="cds--col-lg-12 cds--col-md-8 cds--col-sm-4">
                <div id="transaction-info"></div>
                <br>
                <cds-button id="back-btn" kind="secondary">Back to Transactions</cds-button>
            </div>
        </div>
    </div>

    <!-- Carbon Web Components - Component-specific imports -->
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/ui-shell.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/breadcrumb.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/button.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/modal.min.js"></script>

    <!-- Page Script -->
    <script type="module">
        import { createAdminHeader } from './js/components/headers.js';
        import api from './js/api.js';
        import { showLoadingModal, hideLoadingModal, showErrorModal, formatCurrency, formatDate } from './js/utils.js';

        let currentAccountId = null;
        let currentTransactionId = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Inject header
            document.getElementById('header-container').innerHTML = createAdminHeader();

            // Get parameters from URL
            const urlParams = new URLSearchParams(window.location.search);
            currentAccountId = urlParams.get('accountId');
            currentTransactionId = urlParams.get('transactionId');

            if (!currentAccountId || !currentTransactionId) {
                showErrorModal('Error', 'Missing account ID or transaction ID', () => {
                    window.location.href = 'account-transactions.html';
                });
                return;
            }

            // Load transaction details
            loadTransactionDetails();

            // Handle back button
            document.getElementById('back-btn').addEventListener('click', () => {
                window.location.href = `account-transactions.html?accountId=${currentAccountId}`;
            });
        });

        async function loadTransactionDetails() {
            showLoadingModal('Loading transaction details...');

            try {
                // First, get account details to ensure we have the proper accountId format
                let fullAccountId = currentAccountId;
                try {
                    const account = await api.accounts.getAccount(currentAccountId);
                    // Construct the proper accountId format (sortCode-accountNumber)
                    if (account.sortCode && account.accountNumber && !currentAccountId.includes('-')) {
                        const sortCode = account.sortCode.replace(/-/g, '');
                        fullAccountId = `${sortCode}-${account.accountNumber}`;
                    } else if (account.accountId) {
                        fullAccountId = account.accountId;
                    }
                } catch (accountError) {
                    console.warn('Could not fetch account details, using provided accountId:', accountError);
                }

                const transaction = await api.accounts.getTransaction(fullAccountId, currentTransactionId);
                hideLoadingModal();
                displayTransactionDetails(transaction);
            } catch (error) {
                hideLoadingModal();
                showErrorModal('Error', error.message || 'Failed to load transaction details', () => {
                    window.location.href = `account-transactions.html?accountId=${currentAccountId}`;
                });
            }
        }

        function displayTransactionDetails(transaction) {
            const amount = transaction.amount || 0;
            const isCredit = transaction.creditDebitIndicator === 'CREDIT';
            const amountClass = isCredit ? 'credit-amount' : 'debit-amount';
            const amountPrefix = isCredit ? '+' : '-';

            const detailsHTML = `
                <div class="transaction-details-card">
                    <h3>Transaction Information</h3>
                    <div class="cds--data-table-container">
                        <table class="cds--data-table">
                            <tbody>
                                <tr>
                                    <th>Transaction ID</th>
                                    <td colspan="3">${transaction.transactionId}</td>
                                </tr>
                                <tr>
                                    <th>Account ID</th>
                                    <td>${transaction.accountId}</td>
                                    ${transaction.status ? `<th>Status</th>
                                    <td><span class="status-badge status-${transaction.status.toLowerCase()}">${transaction.status}</span></td>` : '<th></th><td></td>'}
                                </tr>
                                <tr>
                                    <th>Amount</th>
                                    <td class="${amountClass}" style="font-size: 1.5rem; font-weight: 700;">
                                        ${amountPrefix}${formatCurrency(Math.abs(amount), transaction.currency)}
                                    </td>
                                    ${transaction.creditDebitIndicator ? `<th>Type</th>
                                    <td><span class="type-badge type-${transaction.creditDebitIndicator.toLowerCase()}">${transaction.creditDebitIndicator}</span></td>` : '<th></th><td></td>'}
                                </tr>
                                <tr>
                                    <th>Currency</th>
                                    <td>${transaction.currency}</td>
                                    <th>Booking Date & Time</th>
                                    <td>${formatDate(transaction.bookingDateTime)}</td>
                                </tr>
                                ${transaction.valueDateTime ? `
                                <tr>
                                    <th>Value Date & Time</th>
                                    <td colspan="3">${formatDate(transaction.valueDateTime)}</td>
                                </tr>
                                ` : ''}
                                <tr>
                                    <th>Description</th>
                                    <td colspan="3">${transaction.transactionInformation || 'N/A'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    ${transaction.merchantDetails ? `
                    <br>
                    <h3>Merchant Details</h3>
                    <div class="cds--data-table-container">
                        <table class="cds--data-table">
                            <tbody>
                                <tr>
                                    <th>Merchant Name</th>
                                    <td>${transaction.merchantDetails.merchantName || 'N/A'}</td>
                                </tr>
                                <tr>
                                    <th>Merchant Category Code</th>
                                    <td>${transaction.merchantDetails.merchantCategoryCode || 'N/A'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    ` : ''}

                    ${transaction.balance ? `
                    <br>
                    <h3>Balance After Transaction</h3>
                    <div class="cds--data-table-container">
                        <table class="cds--data-table">
                            <tbody>
                                <tr>
                                    <th>Balance Type</th>
                                    <td>${transaction.balance.balanceType}</td>
                                </tr>
                                <tr>
                                    <th>Amount</th>
                                    <td>${formatCurrency(transaction.balance.amount, transaction.balance.currency)}</td>
                                </tr>
                                <tr>
                                    <th>Credit/Debit Indicator</th>
                                    <td>${transaction.balance.creditDebitIndicator || 'N/A'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('transaction-info').innerHTML = detailsHTML;
        }
    </script>

    <style>
        .transaction-details-card {
            background: var(--cds-layer);
            padding: 2rem;
            border-radius: 4px;
        }

        .credit-amount {
            color: #24a148;
            font-weight: 600;
        }
        
        .debit-amount {
            color: #da1e28;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-booked {
            background-color: #24a148;
            color: white;
        }

        .status-pending {
            background-color: #f1c21b;
            color: #161616;
        }

        .status-cancelled {
            background-color: #da1e28;
            color: white;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .type-credit {
            background-color: #d0e2ff;
            color: #0043ce;
        }

        .type-debit {
            background-color: #ffd7d9;
            color: #750e13;
        }

        .cds--data-table th {
            width: 200px;
            font-weight: 600;
        }
    </style>
</body>

</html>
