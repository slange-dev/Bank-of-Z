<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Create Customer - Bank of Z</title>
    
    <!-- Carbon Design System Styles -->
    <link rel="stylesheet" href="css/carbon-styles.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/carbon-overrides.css">
</head>
<body>
    <!-- Header Container -->
    <div id="header-container"></div>
    
    <!-- Main Content -->
    <cds-layer class="cds--white landing-page">
        <!-- Banner -->
        <cds-layer class="landing-page__heading landing-page__banner">
            <cds-breadcrumb>
                <cds-breadcrumb-item>
                    <cds-breadcrumb-link href="index.html">Home</cds-breadcrumb-link>
                </cds-breadcrumb-item>
                <cds-breadcrumb-item>
                    <cds-breadcrumb-link href="admin.html">Control Panel</cds-breadcrumb-link>
                </cds-breadcrumb-item>
                <cds-breadcrumb-item>
                    <cds-breadcrumb-link href="customer-create.html">Create Customer</cds-breadcrumb-link>
                </cds-breadcrumb-item>
            </cds-breadcrumb>
            <h1>Create new customer</h1>
        </cds-layer>

        <cds-grid class="cds--content">
            <cds-column lg="8" md="6" sm="4">
                <cds-stack gap="7">
                    <cds-select id="title" label-text="Title">
                        <cds-select-item value="Mr">Mr</cds-select-item>
                        <cds-select-item value="Mrs">Mrs</cds-select-item>
                        <cds-select-item value="Miss">Miss</cds-select-item>
                        <cds-select-item value="Ms">Ms</cds-select-item>
                        <cds-select-item value="Dr">Dr</cds-select-item>
                        <cds-select-item value="Drs">Drs</cds-select-item>
                        <cds-select-item value="Professor">Professor</cds-select-item>
                        <cds-select-item value="Sir">Sir</cds-select-item>
                        <cds-select-item value="Lady">Lady</cds-select-item>
                        <cds-select-item value="Lord">Lord</cds-select-item>
                    </cds-select>
                    <cds-text-input
                        id="firstName"
                        label="First name"
                        placeholder="Enter first name"
                        maxlength="50"
                        required>
                    </cds-text-input>
                    <cds-text-input
                        id="lastName"
                        label="Last name"
                        placeholder="Enter last name"
                        maxlength="50"
                        required>
                    </cds-text-input>
                    <cds-text-input
                        id="phoneNumber"
                        label="Phone number"
                        placeholder="Enter phone number"
                        maxlength="20"
                        required>
                    </cds-text-input>
                    <cds-text-input
                        id="addressLine1"
                        label="Address line 1"
                        placeholder="Enter address line 1"
                        maxlength="50"
                        required>
                    </cds-text-input>
                    <cds-text-input
                        id="addressLine2"
                        label="Address line 2"
                        placeholder="Enter address line 2"
                        maxlength="50">
                    </cds-text-input>
                    <cds-text-input
                        id="city"
                        label="City"
                        placeholder="Enter city"
                        maxlength="50"
                        required>
                    </cds-text-input>
                    <cds-text-input
                        id="postalCode"
                        label="Postcode"
                        placeholder="Enter postcode"
                        maxlength="10"
                        required>
                    </cds-text-input>
                    <cds-text-input
                        id="country"
                        label="Country"
                        placeholder="Enter country"
                        maxlength="50"
                        required>
                    </cds-text-input>
                    <cds-date-picker date-format="d/m/Y">
                        <cds-date-picker-input 
                            id="dateOfBirth"
                            kind="single" 
                            label-text="Date of Birth"
                            placeholder="dd/mm/yyyy">
                        </cds-date-picker-input>
                    </cds-date-picker>
                    <cds-button id="submit-btn" type="submit" style="width:100%;">Submit</cds-button>
                </cds-stack>
            </cds-column>
            <cds-column lg="8" md="2" sm="0">
                <img class="page-image"
                        src="assets/images/ibm-fireside-chat-trans-bus.png" 
                        alt="customer">
            </cds-column>
        </cds-grid>
    </div>

    <!-- Carbon Web Components - Component-specific imports -->
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/ui-shell.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/breadcrumb.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/select.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/text-input.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/date-picker.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/button.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/modal.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/stack.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/form.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/grid.min.js"></script>
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/layer.min.js"></script>
    
    <!-- Page Script -->
    <script type="module">
        import { createAdminHeader } from './js/components/headers.js';
        import api from './js/api.js';
        import { showLoadingModal, hideLoadingModal, showSuccessModal, showErrorModal, parseDate } from './js/utils.js';
        import { config } from './config.js';
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Inject header
            document.getElementById('header-container').innerHTML = createAdminHeader();
            
            // Handle form submission
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                await createCustomer();
            });
        });
        
        // Mirrors the OpenAPI constraints in src/api/src/main/api/openapi.yaml#CreateCustomerRequest.
        // The backend (CRECUST COBOL) silently truncates over-length names instead of
        // rejecting them, so this is the only place that actually stops it.
        function validateCustomerData({ firstName, lastName, phoneNumber, dateOfBirth, addressLine1, addressLine2, city, postalCode, country }) {
            const requiredFields = {
                'First name': firstName,
                'Last name': lastName,
                'Phone number': phoneNumber,
                'Date of birth': dateOfBirth,
                'Address line 1': addressLine1,
                'City': city,
                'Postal code': postalCode,
                'Country': country
            };
            const missing = Object.entries(requiredFields)
                .filter(([label, value]) => !value)
                .map(([label]) => label);
            if (missing.length > 0) {
                return `Please fill in: ${missing.join(', ')}`;
            }
            const maxLengths = {
                'First name': [firstName, 50],
                'Last name': [lastName, 50],
                'Phone number': [phoneNumber, 15],
                'Address line 1': [addressLine1, 100],
                'Address line 2': [addressLine2, 100],
                'City': [city, 50],
                'Postal code': [postalCode, 10],
                'Country': [country, 50]
            };
            for (const [label, [value, max]] of Object.entries(maxLengths)) {
                if (value && value.length > max) {
                    return `${label} must be ${max} characters or fewer (currently ${value.length})`;
                }
            }
            if (dateOfBirth) {
                const parsed = parseDate(dateOfBirth);
                if (!/^\d{4}-\d{2}-\d{2}$/.test(parsed)) {
                    return 'Date of birth must be a valid date';
                }
            }
            return null;
        }

        async function createCustomer() {
            const title = document.getElementById('title').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const dateOfBirth = document.getElementById('dateOfBirth').value;
            const addressLine1 = document.getElementById('addressLine1').value;
            const addressLine2 = document.getElementById('addressLine2').value;
            const city = document.getElementById('city').value;
            const postalCode = document.getElementById('postalCode').value;
            const country = document.getElementById('country').value;

            const validationError = validateCustomerData({
                firstName, lastName, phoneNumber, dateOfBirth, addressLine1, addressLine2, city, postalCode, country
            });
            if (validationError) {
                showErrorModal('Validation Error', validationError);
                return;
            }

            const customerData = {
                title: title || undefined,
                firstName,
                lastName,
                dateOfBirth: dateOfBirth ? parseDate(dateOfBirth) : undefined,
                phoneNumber: phoneNumber || undefined,
                address: {
                    addressLine1,
                    addressLine2: addressLine2 || undefined,
                    city,
                    postalCode: postalCode || undefined,
                    country: country || undefined
                },
                customerStatus: 'ACTIVE'
            };

            showLoadingModal('Creating customer...');

            try {
                const response = await api.customers.createCustomer(customerData);
                hideLoadingModal();

                showSuccessModal(
                    'Customer created successfully',
                    `A customer profile for ${firstName} ${lastName} has been created. Customer ID: ${response.customerId}`,
                    () => {
                        window.location.href = 'customer-details.html';
                    }
                );
            } catch (error) {
                hideLoadingModal();

                if (error.message && error.message.includes('Failed to fetch')) {
                    showErrorModal('Network Error', 'Failed to connect to the server. Please check your connection.');
                } else {
                    showErrorModal('Error', error.message || 'Failed to create customer. Please try again.');
                }
            }
        }
    </script>
</body>
</html>
