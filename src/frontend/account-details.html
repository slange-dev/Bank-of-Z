<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Account Details - Bank of Z</title>

    <!-- Carbon Design System Styles -->
    <link rel="stylesheet" href="css/carbon-styles.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/carbon-overrides.css">
</head>

<body>
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <cds-layer class="cds--white landing-page">
        <!-- Banner -->
        <cds-layer class="layer landing-page__banner">
            <div class="landing-page__heading">
                <cds-breadcrumb>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="index.html">Home</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="admin.html">Control Panel</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                    <cds-breadcrumb-item>
                        <cds-breadcrumb-link href="account-details.html">Account Details</cds-breadcrumb-link>
                    </cds-breadcrumb-item>
                </cds-breadcrumb>
                <h1>View/Update Account Details</h1>
            </div>
        </cds-layer>

        <div class="cds--content">
            <!-- Error/Notification Container -->
            <div id="notification-container"></div>

            <cds-stack gap="7">
                <!-- Search Section -->
                <cds-form id="search-form" class="form-constrained">
                    <cds-text-input id="customerId" label="Customer ID" placeholder="C1234567 or I000000015"
                        helper-text="Enter Customer ID with prefix: C for CICS, I for IMS (e.g., C1234567 or I000000015)">
                    </cds-text-input>
                    <br />
                    <cds-button id="search-btn">Search Accounts</cds-button>
                </cds-form>

                <!-- Account List Section -->
                <cds-layer class="layer cds--content" id="account-list-section" style="display: none;">
                    <h3>Customer Accounts</h3>
                    <p>Select an account to view details:</p>
                    <div id="accounts-table"></div>
                </cds-layer>

                <!-- Account Details Section -->
                <cds-layer class="layer cds--content" id="details-section" style="display: none;">
                    <h3>Account Information</h3>

                    <cds-form id="account-form" class="form-constrained">
                        <cds-text-input id="accountNumber" label="Account ID" readonly></cds-text-input>
                        <cds-text-input id="customerNumber" label="Customer ID" readonly></cds-text-input>
                        <cds-text-input id="availableBalance" label="Available Balance" readonly></cds-text-input>
                        <cds-text-input id="accountType" label="Account Type" readonly></cds-text-input>
                        <cds-text-input id="currency" label="Currency" readonly></cds-text-input>
                        <cds-text-input id="status" label="Status" readonly></cds-text-input>
                        <cds-text-input id="accountNumberField" label="Account Number" readonly></cds-text-input>
                        <cds-text-input id="sortCode" label="Sort Code" readonly></cds-text-input>
                        <cds-text-input id="iban" label="IBAN" readonly></cds-text-input>
                        <cds-text-input id="nickname" label="Nickname"></cds-text-input>
                        <cds-text-input id="openingDate" label="Opening Date" readonly></cds-text-input>
                        <br>
                        <cds-button id="update-btn">Update Account</cds-button>
                    </cds-form>
                </cds-layer>
            </cds-stack>
        </div>
    </cds-layer>

    <!-- Account Details Section -->
    <div id="details-section" class="cds--row" style="display: none;">
        <div class="cds--col-lg-16 cds--col-md-8 cds--col-sm-4">
            <h3>Account Information</h3>
            <form id="account-form">
                <div class="cds--row">
                    <div class="cds--col-md-4 cds--col-lg-4">
                        <cds-text-input id="accountNumber" label="Account ID" readonly></cds-text-input>
                        <cds-text-input id="customerNumber" label="Customer ID" readonly></cds-text-input>
                        <cds-text-input id="availableBalance" label="Available Balance" readonly></cds-text-input>
                        <cds-text-input id="accountType" label="Account Type" readonly></cds-text-input>
                        <cds-text-input id="currency" label="Currency" readonly></cds-text-input>
                        <cds-text-input id="status" label="Status" readonly></cds-text-input>
                    </div>
                    <div class="cds--col-md-4 cds--col-lg-4">
                        <cds-text-input id="accountNumberField" label="Account Number" readonly></cds-text-input>
                        <cds-text-input id="sortCode" label="Sort Code" readonly></cds-text-input>
                        <cds-text-input id="iban" label="IBAN" readonly></cds-text-input>
                        <cds-text-input id="nickname" label="Nickname"></cds-text-input>
                        <cds-text-input id="openingDate" label="Opening Date" readonly></cds-text-input>
                    </div>
                </div>
                <br>
                <cds-button id="update-btn">Update Account</cds-button>
                <cds-button id="view-transactions-btn" kind="tertiary">View Transactions</cds-button>
            </form>
        </div>
    </div>
    </div>

    <!-- Carbon Web Components - Component-specific imports -->
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/ui-shell.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/breadcrumb.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/text-input.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/button.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/dropdown.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/number-input.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/modal.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/version/v2.47.0/notification.min.js"></script>

    <!-- Page Script -->
    <script type="module">
        import { createAdminHeader } from './js/components/headers.js';
        import api from './js/api.js';
        import { showLoadingModal, hideLoadingModal, showSuccessModal, showErrorModal, formatCurrency, validateCustomerId, parseCustomerId, formatCustomerId } from './js/utils.js';

        let currentAccount = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Inject header
            document.getElementById('header-container').innerHTML = createAdminHeader();

            // Check for customer ID in URL (from customer-details.html)
            const urlParams = new URLSearchParams(window.location.search);
            const customerIdParam = urlParams.get('customerId');
            const accountIdParam = urlParams.get('id') || urlParams.get('accountId');

            if (customerIdParam) {
                // Parse customer ID to get system type and numeric ID
                const parsed = parseCustomerId(customerIdParam);
                if (!parsed) {
                    displayNotification('error', 'Invalid Customer ID', 'Please provide a valid customer ID with prefix (C or I)');
                    return;
                }

                const { system, customerId: numericCustomerId } = parsed;
                const formattedCustomerId = formatCustomerId(numericCustomerId, system);

                // Populate the Customer ID field
                document.getElementById('customerId').value = formattedCustomerId;

                if (accountIdParam) {
                    // Direct link to specific account - load it directly
                    // Pass the original customerIdParam (with prefix) so searchAccount can parse it
                    searchAccount(accountIdParam, customerIdParam);
                } else {
                    // Just customer ID provided - search for all accounts
                    searchCustomerAccounts();
                }
            }

            // Handle search
            document.getElementById('search-btn').addEventListener('click', () => searchCustomerAccounts());
            document.getElementById('customerId').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchCustomerAccounts();
            });

            // Handle update
            document.getElementById('update-btn').addEventListener('click', updateAccount);

            // Handle view transactions
            document.getElementById('view-transactions-btn').addEventListener('click', viewTransactions);
        });

        function displayNotification(kind, title, message) {
            const container = document.getElementById('notification-container');
            container.innerHTML = `
                <cds-inline-notification kind="${kind}" title="${title}" subtitle="${message}" hide-close-button></cds-inline-notification>
                <br />
            `;
            // Scroll to top to ensure notification is visible
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearNotification() {
            const container = document.getElementById('notification-container');
            container.innerHTML = '';
        }

        async function searchCustomerAccounts() {
            const customerIdInput = document.getElementById('customerId').value.trim();

            // Clear any previous notifications
            clearNotification();

            if (!customerIdInput) {
                displayNotification('error', 'Validation Error', 'Please enter a Customer ID');
                return;
            }

            // Validate Customer ID
            const validation = validateCustomerId(customerIdInput);
            if (!validation.valid) {
                displayNotification('error', 'Validation Error', validation.error);
                return;
            }

            // Parse to get numeric ID and system
            const parsed = parseCustomerId(customerIdInput);
            const customerId = parsed.customerId;
            const system = parsed.system;

            showLoadingModal(`Searching for ${system} customer accounts...`);

            try {
                const response = await api.customers.getCustomerAccounts(customerId, system);
                const accounts = response.accounts || [];

                hideLoadingModal();

                if (accounts.length === 0) {
                    displayNotification('error', 'No Results', 'No accounts found for this customer');
                    document.getElementById('account-list-section').style.display = 'none';
                    document.getElementById('details-section').style.display = 'none';
                } else {
                    displayAccountsList(accounts, customerId, system);
                }
            } catch (error) {
                hideLoadingModal();
                displayNotification('error', 'Error', 'Customer not found or error loading accounts');
                document.getElementById('account-list-section').style.display = 'none';
                document.getElementById('details-section').style.display = 'none';
            }
        }

        function displayAccountsList(accounts, customerId, system) {
            const listSection = document.getElementById('account-list-section');
            listSection.style.display = 'block';
            document.getElementById('details-section').style.display = 'none';

            let tableRows = '';
            accounts.forEach((account, index) => {
                const accountNumber = account.accountNumber || account.accountId || 'N/A';
                tableRows += `
                    <tr class="account-row" data-account-index="${index}" style="cursor: pointer;">
                        <td>${account.accountId || 'N/A'}</td>
                        <td>${accountNumber}</td>
                        <td>${account.sortCode || 'N/A'}</td>
                        <td>${account.accountType || 'N/A'}</td>
                        <td>${account.currency || 'N/A'}</td>
                        <td>${account.status || 'N/A'}</td>
                    </tr>
                `;
            });

            document.getElementById('accounts-table').innerHTML = `
                <table class="cds--data-table cds--data-table--zebra">
                    <thead>
                        <tr>
                            <th>Account ID</th>
                            <th>Account Number</th>
                            <th>Sort Code</th>
                            <th>Account Type</th>
                            <th>Currency</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;

            // Add click handlers to rows
            const rows = document.querySelectorAll('.account-row');
            rows.forEach(row => {
                row.addEventListener('click', () => {
                    const index = parseInt(row.getAttribute('data-account-index'));
                    const selectedAccount = accounts[index];
                    selectedAccount._accountIndex = index;
                    selectedAccount._customerId = customerId;
                    selectedAccount._system = system;
                    currentAccount = selectedAccount;
                    displayAccountDetails(selectedAccount, customerId);
                });
            });
        }

        async function searchAccount(accountIdParam, customerIdParam) {
            // This function is kept for URL parameter support
            const urlParams = new URLSearchParams(window.location.search);
            const accountId = accountIdParam || urlParams.get('id') || urlParams.get('accountId');
            const customerIdFromUrl = customerIdParam || urlParams.get('customerId');

            if (!accountId) return;

            // Parse customer ID to strip prefix if present
            let numericCustomerId = null;
            let system = 'CICS';
            if (customerIdFromUrl) {
                console.log('searchAccount - Parsing customer ID:', customerIdFromUrl);
                const parsed = parseCustomerId(customerIdFromUrl);
                console.log('searchAccount - Parsed result:', parsed);
                if (parsed) {
                    numericCustomerId = parsed.customerId;
                    system = parsed.system;
                    console.log('searchAccount - Set system to:', system);
                } else {
                    // If parsing fails, assume it's already numeric
                    numericCustomerId = customerIdFromUrl;
                    console.log('searchAccount - Parsing failed, using as-is');
                }
            }
            console.log('searchAccount - Final system:', system, 'numericCustomerId:', numericCustomerId);

            showLoadingModal('Searching for account...');

            try {
                // For CICS accounts, pass null for customerId to route to /api/accounts/
                // For IMS accounts, pass the numeric customerId to route to /api/ims/accounts/
                const customerIdForApi = system === 'IMS' ? numericCustomerId : null;
                const response = await api.accounts.getAccount(accountId, customerIdForApi);

                // Handle IMS response which may return multiple accounts
                let account = response;

                // Helper function to parse array-like strings or return actual arrays
                const parseArrayField = (field) => {
                    if (Array.isArray(field)) return field;
                    if (typeof field === 'string' && field.startsWith('[')) {
                        try {
                            return JSON.parse(field);
                        } catch (e) {
                            console.warn('Failed to parse array field:', field);
                            return [field];
                        }
                    }
                    return field;
                };

                // Check if accountId is an array (or array-like string)
                const accountIds = parseArrayField(response.accountId);
                if (Array.isArray(accountIds)) {
                    // IMS returns arrays - find the matching account
                    const accountIndex = accountIds.findIndex(id => id.toString() === accountId);
                    if (accountIndex === -1) {
                        throw new Error('Account not found in response');
                    }

                    // Extract single account data from arrays
                    const extractValue = (field) => {
                        const parsed = parseArrayField(field);
                        return Array.isArray(parsed) ? parsed[accountIndex] : parsed;
                    };

                    account = {
                        accountId: accountIds[accountIndex],
                        customerId: extractValue(response.customerId),
                        accountType: extractValue(response.accountType),
                        currency: extractValue(response.currency),
                        status: extractValue(response.status),
                        sortCode: extractValue(response.sortCode),
                        accountNumber: extractValue(response.accountNumber),
                        iban: extractValue(response.iban),
                        openingDate: extractValue(response.openingDate),
                        nickname: extractValue(response.nickname)
                    };
                    account._accountIndex = accountIndex; // Store index for balance lookup
                }

                // Store account with system metadata
                account._customerId = numericCustomerId; // Store numeric ID
                account._system = system; // Store system type
                console.log('searchAccount - Storing on account: _system =', system, '_customerId =', numericCustomerId);
                currentAccount = account;
                hideLoadingModal();
                await displayAccountDetails(account, numericCustomerId);
            } catch (error) {
                hideLoadingModal();
                showErrorModal('Error', 'Account not found or error loading data');
            }
        }

        async function displayAccountDetails(account, customerId = null) {
            document.getElementById('accountNumber').value = account.accountId || '';
            document.getElementById('customerNumber').value = account.customerId || '';
            document.getElementById('accountType').value = account.accountType || '';
            document.getElementById('currency').value = account.currency || '';
            document.getElementById('status').value = account.status || '';
            document.getElementById('sortCode').value = account.sortCode || '';
            document.getElementById('accountNumberField').value = account.accountNumber || '';
            document.getElementById('iban').value = account.iban || '';
            document.getElementById('nickname').value = account.nickname || '';
            document.getElementById('openingDate').value = account.openingDate || '';
            document.getElementById('availableBalance').value = 'Loading...';

            document.getElementById('details-section').style.display = 'block';

            try {
                // Use the system type stored on the account object (set when account was selected)
                // If not available, fall back to checking customer ID prefix
                const system = account._system || (account.customerId && account.customerId.toString().startsWith('I') ? 'IMS' : 'CICS');
                const isIMS = system === 'IMS';

                // Use the numeric customer ID (already stripped of prefix when stored)
                const numericCustomerId = customerId || account._customerId || account.customerId;

                // Debug logging
                console.log('displayAccountDetails - Debug Info:');
                console.log('  account._system:', account._system);
                console.log('  account._customerId:', account._customerId);
                console.log('  customerId param:', customerId);
                console.log('  account.customerId:', account.customerId);
                console.log('  Determined system:', system);
                console.log('  isIMS:', isIMS);
                console.log('  numericCustomerId:', numericCustomerId);
                console.log('  Will call getAccountBalances with:', account.accountId, isIMS ? numericCustomerId : null);

                // For IMS accounts, use numeric customerId; for CICS, use accountId only
                const balance = await api.accounts.getAccountBalances(
                    account.accountId,
                    isIMS ? numericCustomerId : null
                );

                // Handle IMS array response - use the account index if available
                let balanceAmount;
                if (Array.isArray(balance?.amount)) {
                    const index = account._accountIndex !== undefined ? account._accountIndex : 0;
                    balanceAmount = balance.amount[index];
                } else {
                    balanceAmount = balance?.amount;
                }

                document.getElementById('availableBalance').value =
                    balanceAmount !== undefined
                        ? formatCurrency(balanceAmount, balance.currency)
                        : 'N/A';
            } catch (error) {
                console.error(`Error loading balance for account ${account.accountId}:`, error);
                document.getElementById('availableBalance').value = 'Error';
            }
        }

        async function updateAccount() {
            if (!currentAccount) return;

            const updatedData = {
                nickname: document.getElementById('nickname').value
            };

            showLoadingModal('Updating account...');

            try {
                await api.accounts.updateAccount(currentAccount.accountId, updatedData);
                hideLoadingModal();
                showSuccessModal('Success', 'Account updated successfully');
            } catch (error) {
                hideLoadingModal();

                if (error.message.includes('not supported') || error.message.includes('not implemented')) {
                    showErrorModal('Feature Not Implemented', error.message);
                } else if (error.message.includes('Failed to fetch')) {
                    showErrorModal('Network Error', 'Failed to connect to the server. Please check your connection.');
                } else {
                    showErrorModal('Error', error.message || 'Failed to update account');
                }
            }
        }

        function viewTransactions() {
            if (!currentAccount) return;
            window.location.href = `account-transactions.html?accountId=${currentAccount.accountId}`;
        }
    </script>
</body>

</html>
