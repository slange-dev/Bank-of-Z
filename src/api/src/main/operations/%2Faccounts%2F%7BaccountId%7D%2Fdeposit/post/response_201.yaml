---
version: "1.2"
mappings:
- body:
    mappings:
    - accountId:
        required: true
        nullable: false
        template: "{{$zosAssetResponse.commarea.PAYDBCRZ.\"COMM-ACCNO\"}}"
    - availableBalance:
        required: true
        nullable: false
        expression: "$zosAssetResponse.commarea.PAYDBCRZ.\"COMM-AV-BAL\""
    - actualBalance:
        required: true
        nullable: false
        expression: "$zosAssetResponse.commarea.PAYDBCRZ.\"COMM-ACT-BAL\""
