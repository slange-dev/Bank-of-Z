---
version: "1.2"
mappings:
- commarea:
    mappings:
    - PAYDBCRZ:
        required: false
        nullable: false
        mappings:
        - COMM-AMT:
            required: false
            nullable: false
            expression: "$body.amount"
        - COMM-SORTC:
            required: false
            nullable: false
            expression: "$number($body.sortCode)"
        - COMM-ORIGIN:
            required: false
            nullable: false
            mappings:
            - COMM-FACILTYPE:
                required: false
                nullable: false
                expression: 496
