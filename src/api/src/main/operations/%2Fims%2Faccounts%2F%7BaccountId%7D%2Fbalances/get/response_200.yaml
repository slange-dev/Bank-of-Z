---
version: "1.2"
mappings:
- body:
    mappings:
    - balanceType:
        required: true
        nullable: false
        template: "AVAILABLE"
    - amount:
        required: true
        nullable: false
        expression: "$zosAssetResponse.message.\"OUTPUT-AREA\".\"ACCOUNT-SUMMARY\"\
          .\"BALANCE-AS\""
    - currency:
        required: true
        nullable: false
        template: "USD"
    - dateTime:
        required: true
        nullable: false
        template: "{{$now()}}"
