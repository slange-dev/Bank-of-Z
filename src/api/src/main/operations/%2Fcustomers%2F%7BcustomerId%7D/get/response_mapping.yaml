---
version: "1.0"
response_200.yaml:
  condition: "$zosAssetResponse.commarea.INQCUSTZ.\"INQCUST-INQ-SUCCESS\" = 'Y'"
  httpStatusCode: 200
response_400.yaml:
  httpStatusCode: 400
response_401.yaml:
  httpStatusCode: 401
response_403.yaml:
  httpStatusCode: 403
response_404.yaml:
  condition: "$exists($zosAssetResponse.commarea.INQCUSTZ) and $zosAssetResponse.commarea.INQCUSTZ.\"INQCUST-INQ-SUCCESS\" != 'Y'"
  httpStatusCode: 404
response_500.yaml:
  condition: true
  httpStatusCode: 500
