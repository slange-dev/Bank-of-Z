---
version: "1.0"
response_204.yaml:
  condition: "$zosAssetResponse.commarea.DELCUSZ.\"COMM-DEL-SUCCESS\" = 'Y'"
  httpStatusCode: 204
response_400.yaml:
  httpStatusCode: 400
response_401.yaml:
  httpStatusCode: 401
response_403.yaml:
  httpStatusCode: 403
response_404.yaml:
  condition: "$exists($zosAssetResponse.commarea.DELCUSZ) and $zosAssetResponse.commarea.DELCUSZ.\"COMM-DEL-SUCCESS\" != 'Y'"
  httpStatusCode: 404
response_500.yaml:
  condition: true
  httpStatusCode: 500
