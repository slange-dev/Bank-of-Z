---
version: "1.2"
mappings:
- commarea:
    mappings:
    - DELCUSZ:
        required: false
        nullable: false
        mappings:
        - COMM-CUSTNO:
            required: false
            nullable: false
            expression: "$formatNumber($number($pathParameters.customerId), '0000000000')"
        - COMM-SCODE:
            required: false
            nullable: false
            template: "987654"
