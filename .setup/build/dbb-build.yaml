###############################################################
# Include other build configuration files
###############################################################
version: 1.0.0
include: 
  # IMPORTANT!  Copy and configure Languages.yaml and any other 
  # language configuration files from #DBB_HOME/samples/languages
  # to your $DBB_BUILD directory before executing zBuilder.
  - file: languages/Languages.yaml
  - file: datasets.yaml

#########################################
# Executable build lifecycles
#########################################
lifecycles:

  # build single programs from the command line
  - lifecycle: file
    
    # define the list of tasks to execute during the build lifecycle
    tasks:
      - Start
      - ScannerInit
      - MetadataInit
      - FileAnalysis
      - Languages    # Defined in Languages.yaml
      #- zOSConnect
      - Finish

  # build all programs for the application
  - lifecycle: full
    
    # define the list of tasks to execute during the build lifecycle
    tasks:
      - Start
      - ScannerInit
      - MetadataInit
      - FullAnalysis
      - Languages    # Defined in Languages.yaml
      - VanillaFrontend
      - ServerXmlPackager
      - zOSConnect
      - Package
      - Finish

    cli:
      usage: dbb build full [arguments] [options]
      options:
        - longOption: "debug"
          hasArg: false
          description: "Enables the debug options on load modules."

  # build only programs impacted by changes to the application
  - lifecycle: impact

    cli:
      usage: dbb build impact [arguments] [options]
      options:
        - longOption: "baselineRef"
          hasArg: true
          description: "Overrides the baseline reference to measure changes from."
        - longOption: "debug"
          hasArg: false
          description: "Enables the debug options on load modules."

    
    # define the list of tasks to execute during the build lifecycle
    tasks:
      - Start
      - ScannerInit
      - MetadataInit
      - ImpactAnalysis
      - Languages    # Defined in Languages.yaml
      - VanillaFrontend
      - ServerXmlPackager
      - zOSConnect
      - Package
      - Finish

  - lifecycle: pipeline
    cli:
      usage: dbb build pipeline [arguments] [options]
      options:
        - longOption: "release-id"
          hasArg: true
          description: "The release identifier for the package being created. ie: 1.0.0"
        - longOption: "build-id"
          hasArg: true
          description: "The build identifier for the package being created. ie: 20240415.7"
        - longOption: "debug"
          hasArg: false
          description: "Enables the debug options on load modules."

    
    tasks:
      - Start
      - ScannerInit
      - MetadataInit
      - ImpactAnalysis
      - Languages    # Defined in Languages.yaml
      - VanillaFrontend
      - ServerXmlPackager
      - zOSConnect
      - Package
      - Finish

  # build only changed programs on a topic branch which will be merged back into the main build branch
  - lifecycle: merge
 
    # define the list of tasks to execute during the build lifecycle
    tasks:
      - Start
      - ScannerInit
      - MetadataInit
      - MergeAnalysis
      - Languages    # Defined in Languages.yaml
      #- zOSConnect
      - Finish

  # user build for a single program 
  - lifecycle: user
    variables:
      - name: userbuild
        value: true

    # CLI options specific to userbuild
    cli:
      usage: dbb build user [arguments] [options]
      options:
        - longOption: "dependencyFile"
          hasArg: true
          description: "JSON dependency file provided by an IDE used to skip the execution of the DBB scanner."
        - longOption: "errPrefix"
          hasArg: true
          description: "Error prefix for writing error feedback to the Remote Error List view."
        - longOption: "debug"
          hasArg: false
          description: "Enables the debug options on load modules."

    # define the list of tasks to execute during the build lifecycle
    tasks:
      - Start
      - ScannerInit
      - FileAnalysis
      - Languages    # Defined in Languages.yaml
      #- zOSConnect
      - task: UnitTest
        condition: ${STATUS} == 2 || ${STATUS} == 0 # Skip task on build error or PREVIEW
      - Finish
  
  # Scan source files and existing load modules to collect dependency data for source and outputs without creating load modules.
  - lifecycle: metadata
    variables:
      - name: printScannedItems
        value: true
      - name: metadataBuild
        value: true
    # define the list of tasks to execute during the build lifecycle
    tasks:
      - Start
      - ScannerInit
      - MetadataInit
    # - FullAnalysis
      - ImpactAnalysis
      - task: ScanLoadModule
        variables:
          - name: pds
            value: ${HLQ}.LOAD
      - Finish
      
#########################################################################
# Basic task configurations that can be referenced by multiple lifecycles
#########################################################################
tasks:

  # basic build initialization
  - task: Start
  
  # initialize metadata store
  - task: MetadataInit

  # initialize dependency scanners
  - task: ScannerInit
  
  # create simple build list
  - task: FileAnalysis
  
  # create full build list
  - task: FullAnalysis

  # create a build list containing impacted files
  - task: ImpactAnalysis

  # create a build list of topic branch changes flowing back to the main build branch
  - task: MergeAnalysis

    # create build package
  - task: Package
    condition: ${STATUS} == 2 || ${STATUS} == 0 # Skip task on build error or PREVIEW
    variables:
      - name: copyModeMappings
        value:
          - deployType: LOAD
            copyMode: LOAD
          - deployType: LOADLIB
            copyMode: LOAD
          - deployType: CICSLOAD
            copyMode: LOAD
          - deployType: IMSLOAD
            copyMode: LOAD
          - deployType: DBDLOAD
            copyMode: LOAD
          - deployType: PSBLOAD
            copyMode: LOAD
          - deployType: CONFIG
            copyMode: TEXT
          - deployType: ZOSCONNECT-CONFIG
            copyMode: TEXT
          - deployType: WAR
            copyMode: BINARY

  # build finialization
  - task: Finish

  - task: zOSConnect

    # Custom task for Vanilla JS frontend build
  - task: VanillaFrontend
    script: groovy/VanillaFrontend.groovy

  # Custom task for server.xml packaging
  - task: ServerXmlPackager
    script: groovy/ServerXmlPackager.groovy
  
  # default empty Languages stage
  # to be replaced by content of Languges.yaml
  - stage: Languages
    tasks:
